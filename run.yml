name: 24/7 Dual Bot Runner
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-bots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install python-telegram-bot --pre
      - name: Run Both Bots
        env:
          # Token for Bot 1
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          # Token for Bot 2 (The one in the code you just sent)
          BOT_TOKEN_2: ${{ secrets.BOT_TOKEN_2 }}
        run: |
          python bot.py & 
          python bot2.py
